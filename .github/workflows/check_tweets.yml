name: Check Social Updates
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          TWITTER_AUTH_TOKEN: ${{ secrets.TWITTER_AUTH_TOKEN }}
          TWITTER_USERNAME: ${{ vars.TWITTER_USERNAME }}
          LINKEDIN_LI_AT: ${{ secrets.LINKEDIN_LI_AT }}
          LINKEDIN_JSESSIONID: ${{ secrets.LINKEDIN_JSESSIONID }}
          LINKEDIN_COMPANY: ${{ vars.LINKEDIN_COMPANY }}
          LINKEDIN_PROFILE: ${{ vars.LINKEDIN_PROFILE }}
          BOT_AVATAR_URL: ${{ vars.BOT_AVATAR_URL }}
        run: python bot.py

      - name: Commit State
        if: always()
        run: |
          git config user.name "Heuresia Bot"
          git config user.email "bot@heuresia.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update last seen post IDs"
            git push origin HEAD:${{ github.ref_name }}
          fi
